{% extends "auth_base.html" %}
{% load static %}
{% block css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}
{% block content %}

<section class="auth-card">
    <h2>로그인 (STEP1: 세션 로그인) </h2>

    <input id = "username" placeholder="이름을 입력하세요">
    <input id = "password" placeholder="비밀번호를 입력하세요" type="password">
    <button id = "loginBtn"> 로그인 </button>

    <p style="margin-top:12px;">
    아직 계정이 없나요? <a href="/signup-page/">회원가입</a>
    </p>
</section>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", () => {

  if (!window.api) {
    console.error("window.api가 없습니다. auth_base.html에서 static/js/api.js가 로드됐는지 확인하세요.");
    alert("설정 오류: api.js가 로드되지 않았습니다.");
    return; // [추가됨] api 없으면 여기서 중단
  }

  document.getElementById("loginBtn").addEventListener("click", async () => {
    try {

      // 입력창에서 username과 password 값 가져오기
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      // 입력값 간단한 검증
      if (!username || !password) {
        alert("username / password를 입력해주세요.");
        return;
      }

      // 이전 토큰 제거 (충돌 방지)
      localStorage.removeItem(ACCESS_KEY);
      localStorage.removeItem(REFRESH_KEY);

      // 사용자 입력 데이터를 서버로 전송, 기존코드
      // await api.post("/api/login/", { username, password });
      const res = await window.api.post("/api/login/", { username, password });

      const access = res.data?.access;
      const refresh = res.data?.refresh;

      if (!access || !refresh) {
        console.log("토큰 응답이 이상함:", res.data);
        alert("로그인 응답에 토큰이 없습니다. 서버 응답을 확인하세요.");
        return;
      }

      // 토큰 저장
      localStorage.setItem(ACCESS_KEY, access);
      localStorage.setItem(REFRESH_KEY, refresh);

      alert("로그인 성공");
      window.location.href = "/todo/list/";

    } catch (err) {
      console.log(err.response?.data || err.message);
      alert("로그인 실패");
    }
  });

});
</script>
{% endblock %}
