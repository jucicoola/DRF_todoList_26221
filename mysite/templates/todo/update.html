{% extends "base.html" %}
{% load static %}
{% block css %}
<link rel="stylesheet" href="{% static 'css/update.css' %}">
{% endblock %}
{% block content %}
<div id="page-data" data-todo-id="{{ todo.id }}"></div>

<div class="container">
    <h2>Todo 수정</h2>

    <div>
        <label for="title"> 제목 </label>
        <input type = "text", title = "title", id =  "title" value = "{{todo.title}}"></input>
    </div>
    <div>
        <label for="description">설명:</label>
        <textarea name="description" id="description">{{ todo.description }}</textarea>
    </div>

    <div>
        <label for="complete">했니:</label>
        <input type="checkbox" name="complete" id="complete" {% if todo.complete %}checked{% endif %}>
    </div>

    <div>
        <label for="exp">경험치:</label>
        <input type="number" name="exp" id="exp" min="0" value="{{ todo.exp }}">
    </div>

    <button type="button" id="todoUpdate">저장</button>
    <button type="button" onclick="history.back()">취소</button>

    <div>
      <label for="현재 이미지"></label><br>
      {% if todo.img %}
        <img src = "{{todo.img.url}}" alt = "todo img" style="max-width: 250; height:  250px;">
      {% else %}
        <p>-</p>
      {% endif %}
    </div>

    <div>
      <label for="img"> 새로운 이미지: </label>
      <input type="file" id = "img">
    </div>
</div>
{% endblock %}

{% block scripts %}

<script src="{% static 'js/todo_update.js' %}"></script>

{% endblock %}
